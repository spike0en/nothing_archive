name: ➕ Submit an Item to Awesome Nothing
description: Found a cool Nothing app, project, or resource? Submit it here!
title: "[Add]: <Item Name>"
labels: ["enhancement", "new-item"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for contributing to Awesome Nothing! Please fill out the form below to propose adding your item to the list.
  
  - type: dropdown
    id: category
    attributes:
      label: Which category does this belong to?
      description: Select the appropriate documentation page for your item.
      options:
        - apps (Community Apps)
        - projects (Community Projects)
        - photography (GCAM Ports & Presets)
        - guides (Tutorials)
        - official (Official Resources)
    validations:
      required: true

  - type: input
    id: name
    attributes:
      label: Item Name
      placeholder: e.g., "Glyph Composer Pro"
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL/Link URL
      placeholder: e.g., "https://github.com/YourName/GlyphComposerPro"
    validations:
      required: true
      
  - type: input
    id: author
    attributes:
      label: Author / Creator
      placeholder: e.g., "@spike0en"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Short Description
      description: Keep it brief, just one or two sentences explaining what it does.
      placeholder: A powerful app to create custom Glyph patterns with ease.
    validations:
      required: true

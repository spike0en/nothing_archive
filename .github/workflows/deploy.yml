name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  NODE_NO_WARNINGS: "1"

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ${{ vars.USE_SELF_HOSTED == 'true' && fromJSON('["self-hosted", "Linux"]') || 'ubuntu-latest' }}
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: false

      - name: Clean workspace but preserve node_modules and cache
        working-directory: .
        run: |
          git clean -ffdx -e "website/node_modules" -e "website/.docusaurus" -e "website/.cache"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22  # Must match engines.node in package.json
        env:
          NODE_NO_WARNINGS: "1"

      - name: Install dependencies
        run: |
          HASH=$(sha256sum package-lock.json | cut -d' ' -f1)
          HASH_FILE="node_modules/.package-lock.hash"
          if [ -f "$HASH_FILE" ] && [ "$(cat "$HASH_FILE")" = "$HASH" ]; then
            echo "Dependencies are up-to-date (hash matches), skipping install."
          else
            echo "Dependencies changed or missing, running npm ci..."
            npm ci
            echo "$HASH" > "$HASH_FILE"
          fi

      - name: Type check
        run: npm run typecheck

      - name: Build website
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

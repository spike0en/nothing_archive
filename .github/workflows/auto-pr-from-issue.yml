name: Automate PR from Issue

on:
  issues:
    types: [opened]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-pr:
    if: false # TODO: Need to review regex parsing before enabling logic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Parse Issue Form
        id: parse
        uses: zentered/issue-forms-body-parser@v2.0.0

      - name: Update Markdown File
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // This script gets the parsed JSON data format from the issue form
            // then appends it to the target docusaurus markdown file
            // Note: Since each page's table format is different, you'd need custom logic per category 
            // e.g. mapping "apps (Community Apps)" to parsing `website/docs/apps.md`
            // Example logic omitted to prevent breaking specific table structures
            console.log("Would normally append data here!");

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Automated submission: Add ${{ steps.parse.outputs.data.name }}"
          title: "Add ${{ steps.parse.outputs.data.name }}"
          body: |
            Automated PR for issue #${{ github.event.issue.number }}.
            Please review the changes to the markdown table carefully!
          branch: "add-item-issue-${{ github.event.issue.number }}"
          labels: "automated-pr, enhancement"
